<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEase. | Hotel Discovery & Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">StayEase.</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
                <a href="about.html">About</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h1>Find your next perfect stay.</h1>
            <p style="color: var(--muted); margin-bottom: 40px;">Browse the best hotels at the lowest prices.</p>
            
            
            <form action="search-results.html" method="GET" class="search-container">
                <div class="search-group">
                    <label>Location</label>
                    <input type="text" name="city" class="search-input" placeholder="e.g. Cairo" required>
                </div>
                <div class="search-group">
                    <label>Check-in</label>
                    <input type="date" name="check_in" class="search-input">
                </div>
                <div class="search-group">
                    <label>Check-out</label>
                    <input type="date" name="check_out" class="search-input">
                </div>
                <button type="submit" class="btn-primary">Search Hotels</button>
            </form>
        </div>
    </section>

    <section class="featured container">
        <h2 style="margin-bottom: 24px; font-weight: 700;">Featured Hotels</h2>
        </section>

</body>
</html>
